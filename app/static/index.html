<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exellee Chat</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f3f4f6;
    }
    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100vh;
    }
    .sidebar {
      border-right: 1px solid #1f2937;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #1f2937;
    }
    .sidebar-section {
      padding: 12px 16px;
      border-bottom: 1px solid #1f2937;
    }
    .user-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }
    .small-avatar {
      width: 30px;
      height: 30px;
      font-size: 12px;
    }
    input, button, textarea {
      font: inherit;
    }
    input, textarea {
      width: 100%;
      border: 1px solid #374151;
      background: #111827;
      color: #f3f4f6;
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
    }
    textarea {
      resize: none;
      min-height: 74px;
      max-height: 150px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-weight: 600;
    }
    button.secondary {
      background: #374151;
    }
    button.danger {
      background: #dc2626;
    }
    .auth-box {
      padding: 16px;
      display: grid;
      gap: 10px;
    }
    .chat-list, .user-list {
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .chat-item, .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      background: transparent;
      border: 1px solid transparent;
    }
    .chat-item:hover, .user-item:hover {
      background: #111827;
      border-color: #1f2937;
    }
    .chat-item.active {
      background: #1d4ed8;
      border-color: #2563eb;
    }
    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .main-header {
      padding: 16px;
      border-bottom: 1px solid #1f2937;
      background: #0b1220;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #111827;
    }
    .message {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .bubble {
      background: #1f2937;
      border-radius: 14px;
      padding: 10px 12px;
      max-width: 760px;
    }
    .meta {
      font-size: 12px;
      opacity: 0.75;
      margin-bottom: 4px;
    }
    .composer {
      padding: 14px 16px;
      border-top: 1px solid #1f2937;
      background: #0b1220;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }
    .send-btn {
      height: 42px;
      min-width: 88px;
      align-self: end;
    }
    .typing {
      padding: 0 16px 10px;
      font-size: 13px;
      color: #93c5fd;
      min-height: 22px;
      background: #0b1220;
    }
    .muted {
      opacity: 0.7;
      font-size: 13px;
    }
    .hidden {
      display: none !important;
    }
    .inline-row {
      display: flex;
      gap: 8px;
    }
    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #1f2937;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="user-badge hidden" id="currentUserBox">
          <div class="avatar" id="currentUserAvatar"></div>
          <div>
            <div id="currentUsername"></div>
            <div class="muted">Вы вошли в систему</div>
          </div>
        </div>

        <div id="authBox" class="auth-box">
          <input id="username" placeholder="Логин" />
          <input id="password" type="password" placeholder="Пароль" />
          <div class="inline-row">
            <button onclick="register()">Регистрация</button>
            <button class="secondary" onclick="login()">Войти</button>
          </div>
        </div>

        <div id="loggedActions" class="hidden">
          <div class="inline-row" style="margin-top: 12px;">
            <button onclick="showCreateChat()">Новый чат</button>
            <button class="danger" onclick="logout()">Выйти</button>
          </div>
        </div>
      </div>

      <div class="sidebar-section hidden" id="createChatBox">
        <div style="font-weight: 700; margin-bottom: 8px;">Создать чат</div>
        <input id="chatTitle" placeholder="Название чата" />
        <div style="height: 8px;"></div>
        <label style="display:flex; gap:8px; align-items:center; font-size:14px;">
          <input type="checkbox" id="chatIsPublic" />
          Общий чат
        </label>
        <div style="height: 8px;"></div>
        <input id="chatPassword" placeholder="Пароль для создания общего чата" />
        <div style="height: 8px;"></div>
        <div class="inline-row">
          <button onclick="createChat()">Создать</button>
          <button class="secondary" onclick="hideCreateChat()">Отмена</button>
        </div>
      </div>

      <div class="sidebar-section">
        <div style="font-weight: 700; margin-bottom: 8px;">Чаты</div>
        <div class="chat-list" id="chatList"></div>
      </div>

      <div class="sidebar-section">
        <div style="font-weight: 700; margin-bottom: 8px;">Пользователи</div>
        <div class="user-list" id="userList"></div>
      </div>
    </aside>

    <main class="main">
      <div class="main-header">
        <div>
          <div id="chatTitleView" style="font-size: 18px; font-weight: 700;">Выбери чат</div>
          <div class="muted" id="onlineInfo">Нет активного чата</div>
        </div>
        <div class="pill" id="chatTypePill">—</div>
      </div>

      <div class="messages" id="messages"></div>
      <div class="typing" id="typingIndicator"></div>

      <div class="composer">
        <textarea id="messageInput" placeholder="Напиши сообщение..." oninput="handleTypingInput()"></textarea>
        <button class="send-btn" onclick="sendMessage()">Отправить</button>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let token = localStorage.getItem("token") || "";
    let currentUser = null;
    let currentChatId = null;
    let currentChat = null;
    let ws = null;
    let typingTimeout = null;
    let activeTypingUser = null;
    let chatsCache = [];
    let onlineUsers = [];

    function getHeaders() {
      return { "Content-Type": "application/json" };
    }

    function authUrl(path) {
      return `${API_BASE}${path}${path.includes("?") ? "&" : "?"}token=${encodeURIComponent(token)}`;
    }

    function avatarHtml(username, color, small = false) {
      const letter = (username || "?").trim().charAt(0).toUpperCase();
      return `<div class="avatar ${small ? "small-avatar" : ""}" style="background:${color || "#2563eb"}">${letter}</div>`;
    }

    async function api(path, options = {}, useToken = true) {
      const url = useToken ? authUrl(path) : `${API_BASE}${path}`;
      const res = await fetch(url, {
        ...options,
        headers: {
          ...getHeaders(),
          ...(options.headers || {})
        }
      });

      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch { data = text; }

      if (!res.ok) {
        throw new Error(typeof data === "object" && data?.detail ? data.detail : text || "Request failed");
      }

      return data;
    }

    async function register() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        alert("Введи логин и пароль");
        return;
      }

      try {
        await api("/register", {
          method: "POST",
          body: JSON.stringify({ username, password })
        }, false);

        await login();
      } catch (e) {
        alert(e.message);
      }
    }

    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        alert("Введи логин и пароль");
        return;
      }

      try {
        const data = await api("/login", {
          method: "POST",
          body: JSON.stringify({ username, password })
        }, false);

        token = data.access_token;
        localStorage.setItem("token", token);
        await initAfterAuth();
      } catch (e) {
        alert(e.message);
      }
    }

    function logout() {
      token = "";
      currentUser = null;
      currentChatId = null;
      currentChat = null;
      localStorage.removeItem("token");
      if (ws) ws.close();

      document.getElementById("authBox").classList.remove("hidden");
      document.getElementById("loggedActions").classList.add("hidden");
      document.getElementById("currentUserBox").classList.add("hidden");
      document.getElementById("chatList").innerHTML = "";
      document.getElementById("userList").innerHTML = "";
      document.getElementById("messages").innerHTML = "";
      document.getElementById("chatTitleView").textContent = "Выбери чат";
      document.getElementById("onlineInfo").textContent = "Нет активного чата";
      document.getElementById("chatTypePill").textContent = "—";
      document.title = "Exellee Chat";
    }

    async function initAfterAuth() {
      try {
        currentUser = await api("/me");
        renderCurrentUser();
        document.getElementById("authBox").classList.add("hidden");
        document.getElementById("loggedActions").classList.remove("hidden");
        document.getElementById("currentUserBox").classList.remove("hidden");

        if (Notification && Notification.permission === "default") {
          Notification.requestPermission();
        }

        await Promise.all([loadChats(), loadUsers(), loadOnlineUsers()]);
      } catch (e) {
        console.error(e);
        logout();
      }
    }

    function renderCurrentUser() {
      document.getElementById("currentUsername").textContent = currentUser.username;
      document.getElementById("currentUserAvatar").style.background = currentUser.avatar_color;
      document.getElementById("currentUserAvatar").textContent = currentUser.username.charAt(0).toUpperCase();
    }

    function showCreateChat() {
      document.getElementById("createChatBox").classList.remove("hidden");
    }

    function hideCreateChat() {
      document.getElementById("createChatBox").classList.add("hidden");
    }

    async function createChat() {
      const title = document.getElementById("chatTitle").value.trim();
      const isPublic = document.getElementById("chatIsPublic").checked;
      const creationPassword = document.getElementById("chatPassword").value.trim();

      if (!title) {
        alert("Введите название чата");
        return;
      }

      try {
        await api("/chats", {
          method: "POST",
          body: JSON.stringify({
            title,
            is_public: isPublic,
            creation_password: creationPassword || null
          })
        });

        document.getElementById("chatTitle").value = "";
        document.getElementById("chatPassword").value = "";
        document.getElementById("chatIsPublic").checked = false;
        hideCreateChat();
        await loadChats();
      } catch (e) {
        alert(e.message);
      }
    }

    async function loadChats() {
      if (!token) return;
      chatsCache = await api("/chats");
      const list = document.getElementById("chatList");
      list.innerHTML = "";

      chatsCache.forEach(chat => {
        const el = document.createElement("div");
        el.className = "chat-item" + (chat.id === currentChatId ? " active" : "");
        el.innerHTML = `
          ${avatarHtml(chat.title, chat.is_public ? "#0ea5e9" : "#7c3aed", true)}
          <div style="min-width:0;">
            <div style="font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(chat.title)}</div>
            <div class="muted">${chat.is_public ? "Общий чат" : "Личка"}</div>
          </div>
        `;
        el.onclick = () => openChat(chat);
        list.appendChild(el);
      });
    }

    async function loadUsers() {
      if (!token) return;
      const users = await api("/users");
      const list = document.getElementById("userList");
      list.innerHTML = "";

      users.forEach(user => {
        const el = document.createElement("div");
        el.className = "user-item";
        el.innerHTML = `
          ${avatarHtml(user.username, user.avatar_color, true)}
          <div style="min-width:0;">
            <div style="font-weight:700;">${escapeHtml(user.username)}</div>
          </div>
        `;
        el.onclick = () => createDirectChat(user.id);
        list.appendChild(el);
      });
    }

    async function loadOnlineUsers() {
      try {
        onlineUsers = await api("/online-users");
        updateOnlineInfo();
      } catch (e) {
        console.error(e);
      }
    }

    function updateOnlineInfo() {
      if (!currentChat) {
        document.getElementById("onlineInfo").textContent = "Нет активного чата";
        return;
      }

      const onlineNames = onlineUsers.map(u => u.username);
      if (currentChat.is_public) {
        document.getElementById("onlineInfo").textContent = `Онлайн: ${onlineNames.length}`;
      } else {
        const other = onlineUsers.find(u => u.username === currentChat.title);
        document.getElementById("onlineInfo").textContent = other ? "В сети" : "Не в сети";
      }
    }

    async function createDirectChat(userId) {
      try {
        const chat = await api("/direct-chats", {
          method: "POST",
          body: JSON.stringify({ user_id: userId })
        });

        await loadChats();
        await openChat(chat);
      } catch (e) {
        alert(e.message);
      }
    }

    async function openChat(chat) {
      currentChatId = chat.id;
      currentChat = chat;

      document.getElementById("chatTitleView").textContent = chat.title;
      document.getElementById("chatTypePill").textContent = chat.is_public ? "Общий чат" : "Личка";
      updateOnlineInfo();

      await loadChats();
      await loadMessages();
      connectWs();
    }

    async function loadMessages() {
      if (!currentChatId) return;
      const messages = await api(`/chats/${currentChatId}/messages`);
      renderMessages(messages);
    }

    function renderMessages(messages) {
      const box = document.getElementById("messages");
      box.innerHTML = "";

      messages.forEach(msg => {
        const el = document.createElement("div");
        el.className = "message";
        el.innerHTML = `
          ${avatarHtml(msg.username, msg.avatar_color)}
          <div class="bubble">
            <div class="meta">${escapeHtml(msg.username || "Unknown")} • ${formatTime(msg.created_at)}</div>
            <div>${escapeHtml(msg.content)}</div>
          </div>
        `;
        box.appendChild(el);
      });

      box.scrollTop = box.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("messageInput");
      const content = input.value.trim();
      if (!currentChatId || !content) return;

      try {
        await api(`/chats/${currentChatId}/messages`, {
          method: "POST",
          body: JSON.stringify({ content })
        });
        input.value = "";
      } catch (e) {
        alert(e.message);
      }
    }

    function connectWs() {
      if (!currentChatId || !token) return;
      if (ws) ws.close();

      const proto = location.protocol === "https:" ? "wss" : "ws";
      ws = new WebSocket(`${proto}://${location.host}/ws/${currentChatId}?token=${encodeURIComponent(token)}`);

      ws.onmessage = (event) => {
        let data;
        try { data = JSON.parse(event.data); } catch { return; }

        if (data.type === "new_message") {
          appendMessage(data.message);

          if (document.hidden || data.message.chat_id !== currentChatId) {
            document.title = `Новое сообщение • ${data.message.username}`;
          }

          if (Notification && Notification.permission === "granted" && data.message.user_id !== currentUser.id) {
            new Notification(`Сообщение от ${data.message.username}`, {
              body: data.message.content
            });
          }
        }

        if (data.type === "typing" && data.user_id !== currentUser.id) {
          activeTypingUser = data.username;
          document.getElementById("typingIndicator").textContent = `${data.username} печатает...`;
          clearTimeout(typingTimeout);
          typingTimeout = setTimeout(() => {
            activeTypingUser = null;
            document.getElementById("typingIndicator").textContent = "";
          }, 1500);
        }

        if (data.type === "online_users") {
          onlineUsers = data.users || [];
          updateOnlineInfo();
        }
      };

      ws.onclose = () => {
        setTimeout(() => {
          if (currentChatId) connectWs();
        }, 2000);
      };
    }

    function appendMessage(msg) {
      if (msg.chat_id !== currentChatId) return;

      const box = document.getElementById("messages");
      const el = document.createElement("div");
      el.className = "message";
      el.innerHTML = `
        ${avatarHtml(msg.username, msg.avatar_color)}
        <div class="bubble">
          <div class="meta">${escapeHtml(msg.username || "Unknown")} • ${formatTime(msg.created_at)}</div>
          <div>${escapeHtml(msg.content)}</div>
        </div>
      `;
      box.appendChild(el);
      box.scrollTop = box.scrollHeight;
    }

    function handleTypingInput() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send("typing");
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatTime(iso) {
      try {
        return new Date(iso).toLocaleString();
      } catch {
        return iso;
      }
    }

    document.getElementById("messageInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        document.title = "Exellee Chat";
      }
    });

    if (token) {
      initAfterAuth();
    }
  </script>
</body>
</html>
