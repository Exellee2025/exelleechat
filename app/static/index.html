<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exellee Chat</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f3f4f6;
    }

    .hidden {
      display: none !important;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 360px 1fr;
      height: 100vh;
    }

    .sidebar {
      border-right: 1px solid #243041;
      padding: 16px;
      overflow-y: auto;
      background: #0f172a;
    }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .card {
      background: #172033;
      border: 1px solid #243041;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .flex-grow {
      flex: 1;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    input, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #334155;
      padding: 10px 12px;
      font-size: 14px;
    }

    input {
      background: #0b1220;
      color: #f8fafc;
      margin-top: 8px;
    }

    button {
      cursor: pointer;
      background: #2563eb;
      color: white;
      border: none;
      transition: 0.15s ease;
    }

    button:hover {
      opacity: 0.92;
    }

    button.secondary {
      background: #475569;
    }

    button.danger {
      background: #dc2626;
    }

    .chat-header {
      min-height: 72px;
      padding: 16px 20px;
      border-bottom: 1px solid #243041;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .chat-header-title {
      font-size: 20px;
      font-weight: 700;
    }

    .typing {
      font-size: 13px;
      color: #93c5fd;
      min-height: 18px;
      margin-top: 4px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #111827;
    }

    .message {
      margin-bottom: 12px;
      max-width: 760px;
    }

    .message-bubble {
      display: inline-block;
      padding: 10px 12px;
      border-radius: 14px;
      background: #1f2937;
      border: 1px solid #334155;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 13px;
      color: #cbd5e1;
    }

    .message-content {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.35;
    }

    .composer {
      padding: 12px 16px;
      border-top: 1px solid #243041;
      background: #0f172a;
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 10px;
    }

    .composer input {
      margin-top: 0;
      height: 42px;
    }

    .composer button {
      height: 42px;
      font-size: 14px;
      padding: 0 14px;
    }

    .chats-list,
    .users-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-item,
    .user-item {
      padding: 10px 12px;
      background: #0b1220;
      border: 1px solid #243041;
      border-radius: 12px;
      cursor: pointer;
    }

    .chat-item:hover,
    .user-item:hover {
      background: #111b31;
    }

    .chat-item.active {
      border-color: #60a5fa;
      background: #14213d;
    }

    .chat-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .chat-meta,
    .user-meta,
    .muted {
      color: #94a3b8;
      font-size: 12px;
    }

    .profile-row,
    .user-line {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: #334155 center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .message .avatar {
      width: 26px;
      height: 26px;
      font-size: 12px;
    }

    .profile-name {
      font-weight: 700;
    }

    .empty {
      color: #94a3b8;
      font-size: 14px;
      padding: 8px 0;
    }

    @media (max-width: 900px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        max-height: 45vh;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">Exellee Chat</div>

      <div id="authBlock" class="card">
        <h3>Вход / регистрация</h3>
        <input id="username" placeholder="Логин" />
        <input id="password" type="password" placeholder="Пароль" />
        <input id="avatarUrl" placeholder="Ссылка на аватар (необязательно)" />
        <div class="row">
          <button id="loginBtn">Войти</button>
          <button id="registerBtn" class="secondary">Регистрация</button>
        </div>
      </div>

      <div id="profileBlock" class="card hidden">
        <div class="profile-row">
          <div id="myAvatar" class="avatar"></div>
          <div>
            <div id="myUsername" class="profile-name"></div>
            <div class="muted">Вы в системе</div>
          </div>
        </div>
        <input id="newAvatarUrl" placeholder="Новая ссылка на аватар" />
        <div class="row">
          <button id="saveAvatarBtn" class="secondary">Сохранить аватар</button>
          <button id="logoutBtn" class="danger">Выйти</button>
        </div>
      </div>

      <div id="chatControls" class="card hidden">
        <h3>Создать общий чат</h3>
        <input id="chatTitle" placeholder="Название чата" />
        <input id="createPassword" type="password" placeholder="Пароль на создание общего чата" value="315146" />
        <button id="createChatBtn">Создать общий чат</button>
      </div>

      <div id="usersBlock" class="card hidden">
        <h3>Пользователи</h3>
        <div id="usersList" class="users-list"></div>
      </div>

      <div id="chatsBlock" class="card hidden flex-grow">
        <h3>Чаты</h3>
        <div id="chatsList" class="chats-list"></div>
      </div>
    </aside>

    <main class="main">
      <div id="chatHeader" class="chat-header">
        <div class="chat-header-title">Выбери чат</div>
        <div id="typingIndicator" class="typing"></div>
      </div>

      <div id="messages" class="messages"></div>

      <div id="composer" class="composer hidden">
        <input id="messageInput" placeholder="Напиши сообщение..." />
        <button id="sendBtn">Отправить</button>
      </div>
    </main>
  </div>

  <script>
    // Add JavaScript code for functionality here (same as in previous message)
  </script>
</body>
</html>
